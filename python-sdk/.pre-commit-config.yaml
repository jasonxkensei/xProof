repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        args: ["--config", "python-sdk/pyproject.toml"]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        args: ["--config", "python-sdk/pyproject.toml"]
        pass_filenames: true

      - id: mypy
        name: mypy type-check
        entry: make -C python-sdk typecheck
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
